<!DOCTYPE html>
<html lang="es">
<head>

<meta charset="UTF-8">
<title>Catálogo de Capuchones</title>

<style>
:root{
--primary:#2c7be5;
--dark:#1e2a38;
--bg:#f4f7fb;
--card:#ffffff;
}

body{
font-family:'Segoe UI',sans-serif;
background:var(--bg);
margin:0;
}

header{
background:linear-gradient(90deg,var(--dark),var(--primary));
color:white;
padding:25px;
text-align:center;
box-shadow:0 4px 15px rgba(0,0,0,0.2);
}

header h1{
margin:0;
font-size:28px;
}

.controls{
display:flex;
justify-content:center;
gap:12px;
padding:20px;
flex-wrap:wrap;
}

input{
padding:12px;
width:240px;
border-radius:8px;
border:1px solid #ccc;
}

button{
padding:10px 18px;
border:none;
background:var(--primary);
color:white;
cursor:pointer;
border-radius:8px;
font-weight:600;
}

.catalogo{
display:grid;
grid-template-columns:repeat(auto-fill,minmax(220px,1fr));
gap:25px;
padding:20px;
}

.card{
background:var(--card);
border-radius:14px;
box-shadow:0 8px 20px rgba(0,0,0,0.08);
padding:12px;
text-align:center;
position:relative;
}

.card::after{
content:attr(data-bodega);
position:absolute;
top:10px;
left:10px;
font-size:11px;
background:rgba(0,0,0,0.6);
color:white;
padding:3px 8px;
border-radius:6px;
}

.img-container{
height:220px;
display:flex;
align-items:center;
justify-content:center;
background:#f1f3f7;
border-radius:10px;
}

.img-container img{
max-width:100%;
max-height:100%;
object-fit:contain;
cursor:pointer;
}

.modal{
display:none;
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,0.9);
justify-content:center;
align-items:center;
}

.modal img{
max-width:85%;
max-height:85%;
}

.close{
position:absolute;
top:20px;
right:40px;
font-size:35px;
color:white;
cursor:pointer;
}
</style>

</head>

<body>

<header>
<h1>📦 Catálogo de Capuchones</h1>
</header>

<div class="controls">
<input type="text" id="buscador" placeholder="Buscar foto...">
<button onclick="mostrarBodega('todas')">Todas</button>
<button onclick="mostrarBodega('b1')">Bodega 1</button>
<button onclick="mostrarBodega('b2')">Bodega 2</button>
</div>

<div id="contador" style="text-align:center;font-weight:bold;"></div>

<div class="catalogo" id="catalogo"></div>

<div class="modal" id="modal">
<span class="close" onclick="cerrar()">✖</span>
<img id="imagenGrande">
</div>

<!-- FIREBASE -->
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>

<script>
const firebaseConfig = {
  apiKey: "AIzaSyBhQ8vaJ1f4vPIWpwgEo706DXbRV-6vz6s",
  authDomain: "inventario-capuchones.firebaseapp.com",
  projectId: "inventario-capuchones"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();

let inventario = [];

// 🔥 TIEMPO REAL
db.collection("inventario").onSnapshot(snap=>{
  inventario = snap.docs.map(d=>d.data());
  actualizarStock();
});

function obtenerStock(bodega, numero){
  let item = inventario.find(i => 
    i.bodega === bodega && i.foto == numero
  )
  return item ? item.stock : 0
}

// CREAR CARDS
const catalogo = document.getElementById("catalogo")

const bodega1 = 60
const bodega2 = 23

function crearImagenes(){
for(let i=1;i<=bodega1;i++){
crearCard("bodega1", i, "b1")
}
for(let i=1;i<=bodega2;i++){
crearCard("bodega2", i, "b2")
}
}

function crearCard(carpeta, numero, clase){

let card = document.createElement("div")
card.className = "card " + clase
card.setAttribute("data-bodega", clase === "b1" ? "B1" : "B2")

let container = document.createElement("div")
container.className = "img-container"

let img = document.createElement("img")
img.src = `${carpeta}/foto${numero}.jpg`

img.onerror = function(){
if(this.src.includes(".jpg")) this.src = `${carpeta}/foto${numero}.jpeg`
else if(this.src.includes(".jpeg")) this.src = `${carpeta}/foto${numero}.png`
}

img.onclick = function(){ abrir(this) }

let titulo = document.createElement("p")
titulo.innerText = `Foto ${numero}`

let stock = document.createElement("p")
stock.id = `stock-${clase}-${numero}`
stock.innerText = "Stock: ..."
stock.style.fontWeight = "bold"

container.appendChild(img)
card.appendChild(container)
card.appendChild(titulo)
card.appendChild(stock)

catalogo.appendChild(card)
}

crearImagenes()

// 🔥 ACTUALIZA STOCK
function actualizarStock(){
  inventario.forEach(it=>{
    let el = document.getElementById(`stock-${it.bodega}-${it.foto}`)
    if(el){
      el.innerText = "Stock: " + it.stock

      if(it.stock == 0){
        el.style.color = "red"
      }else if(it.stock < 50){
        el.style.color = "orange"
      }else{
        el.style.color = "green"
      }
    }
  })
}

// BUSCADOR
document.getElementById("buscador").addEventListener("keyup", function(){
let texto = this.value.toLowerCase()
let cards = document.querySelectorAll(".card")

cards.forEach(c=>{
let nombre = c.innerText.toLowerCase()
c.style.display = nombre.includes(texto) ? "block" : "none"
})
})

// FILTRO
function mostrarBodega(bodega){
let cards = document.querySelectorAll(".card")
cards.forEach(c=>{
if(bodega==="todas" || c.classList.contains(bodega)){
c.style.display="block"
}else{
c.style.display="none"
}
})
}

// MODAL
function abrir(img){
document.getElementById("modal").style.display="flex"
document.getElementById("imagenGrande").src = img.src
}

function cerrar(){
document.getElementById("modal").style.display="none"
}

</script>

</body>
</html>
